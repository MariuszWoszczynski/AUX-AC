dashboard_import:
  package_import_url: github://MariuszWoszczynski/AUX-AC/aux-ac.yaml@main
  import_full_config: true

substitutions:
  name: "aux-ac"
  friendly_name: "AUX AC"

esphome:
  name: "${name}"
  friendly_name: "${friendly_name}"
  project:
    name: esphome.aux_ac
    version: "1.0"
  platformio_options:
    build_flags:
      - -DARDUINO_USB_MODE=1
      - -DARDUINO_USB_CDC_ON_BOOT=1
      
esp32:
  board: lolin_s3_mini #lolin_c3_mini
  framework:
    type: arduino

# Logi na USB
logger:
  level: DEBUG
#  hardware_uart: USB_SERIAL_JTAG

api: 
  encryption:
    key: "q0M48mES8G278MS//dqgeOEV4dZ+CQTGp1CpPyRyLoA="

ota:
  - platform: esphome
    password: "0336e0744b241439aa1f5b07c9761d7d"

wifi:
#  ssid: !secret wifi_ssid                  ############################ odkomentowaćsekcję wifi
#  password: !secret wifi_password
#  power_save_mode: NONE
#  fast_connect: true
  output_power: 8.5dBm                      ##############krytyczne - zostawić jak jest !!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!
  ap:
    ssid: "AUX AC Fallback Hotspot"

web_server:
  port: 80
  version: 3

captive_portal:

external_components:
  - source:
      type: git
      url: https://github.com/GrKoR/esphome_aux_ac_component

uart:
  - id: ac_uart_bus
    rx_pin: GPIO6     #GPIO20 #w C3         ########## Jak nie będzie komunikacji to zamienić GPIO TX i RX
    tx_pin: GPIO7     #GPIO21 #w C3         ########## Jak nie będzie komunikacji to zamienić GPIO TX i RX
    baud_rate: 4800
    data_bits: 8
    parity: EVEN
    stop_bits: 1


climate:
  - platform: aux_ac
    name: "AC Name"
    id: aux_id
    uart_id: ac_uart_bus
    period: 7s 
    show_action: true
    display_inverted: false
    timeout: 150
    indoor_temperature:
      name: AC Indoor Temperature
      id: ac_indoor_temp
      accuracy_decimals: 1
      internal: false
    outdoor_temperature:
      name: AC Outdoor Temperature
      id: ac_outdoor_temp
      internal: false
    outbound_temperature:
      name: AC Coolant Outbound Temperature
      id: ac_outbound_temp
      internal: false
    inbound_temperature:
      name: AC Coolant Inbound Temperature
      id: ac_inbound_temp
      internal: false
    compressor_temperature:
      name: AC Compressor Temperature
      id: ac_strange_temp
      internal: false
    display_state:
      name: AC Display State
      id: ac_display_state
      internal: false
    defrost_state:
      name: AC Defrost State
      id: ac_defrost_state
      internal: false
    inverter_power:
      name: AC Inverter Power
      id: ac_inverter_power
      internal: false
    inverter_power_limit_value:
      name: AC Inverter Power Limit Value
      id: ac_inverter_power_limit_value
      internal: false
    inverter_power_limit_state:
      name: AC Inverter Power Limit State
      id: ac_inverter_power_limit_state
      internal: false
    preset_reporter:
      name: AC Preset Reporter
      id: ac_preset_reporter
      internal: false
    vlouver_state:
      name: AC Vertical Louvers State
      id: ac_vlouver_state
      internal: false
    visual:
      min_temperature: 16
      max_temperature: 32
      temperature_step: 1
    supported_modes:
      - HEAT_COOL
      - COOL
      - HEAT
      - DRY
      - FAN_ONLY
    custom_fan_modes:
      - MUTE
      - TURBO
    supported_presets:
      - SLEEP
    custom_presets:
      - CLEAN
      - HEALTH
      - ANTIFUNGUS
    supported_swing_modes:
      - VERTICAL
      - HORIZONTAL
      - BOTH
